<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TalentHub - Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{

            width:400px;

            background:white;

            padding:40px;

            border-radius:10px;

            box-shadow:0 0 15px rgba(0,0,0,.15);

        }

        h2{

            text-align:center;

            margin-bottom:25px;

            color:#2c3e50;

        }

        input{

            width:100%;

            padding:12px;

            margin-top:10px;

            margin-bottom:20px;

            border:1px solid #ccc;

            border-radius:6px;

        }

        button{

            width:100%;

            padding:12px;

            background:#007bff;

            color:white;

            border:none;

            border-radius:6px;

            cursor:pointer;

        }

        button:hover{

            background:#0056b3;

        }

        .link{

            text-align:center;

            margin-top:15px;

        }

        .link a{

            text-decoration:none;

            color:#007bff;

        }

        .error{

            color:red;

            text-align:center;

            margin-bottom:15px;

        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>TalentHub Login</h2>

    <div th:if="${param.error}" class="error">
        Incorrect username or password.
    </div>

    <form th:action="@{/login}" method="post">

        <input
                type="text"
                name="username"
                placeholder="Username or Email"
                required>

        <input
                type="password"
                name="password"
                placeholder="Password"
                required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="link">

        <a th:href="@{/register}">
            Create Account
        </a>

        |

        <a th:href="@{/forgot-password}">
            Forgot Password?
        </a>

    </div>

</div>

</body>
</html>
