<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>TalentHub - Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .logo{
            width:230px;
            display:block;
            margin:0 auto 8px;
        }
        .login-box{

            width:400px;

            background:white;

            padding:40px;

            border-radius:10px;

            box-shadow:0 0 15px rgba(0,0,0,.15);

        }

        h2{

            text-align:center;

            margin-bottom:20px;

        }
        label{

            display:block;

            font-weight:600;

            margin-bottom:8px;

            margin-top:10px;

            color:#2c3e50;

        }
        input{

            width:100%;

            padding:14px;

            margin-bottom:20px;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:15px;

        }

        button{

            width:100%;

            padding:14px;

            background:#1677ff;

            color:white;

            border:none;

            border-radius:8px;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

        }

        button:hover{

            background:#0d5fd3;

        }

        .link{

            text-align:center;

            margin-top:15px;

        }

        .link a{

            text-decoration:none;

            color:#007bff;

        }

        .error{

            color:red;

            text-align:center;

            margin-bottom:15px;

        }

        .password-container{

            position:relative;

        }

        .password-container input{

            padding-right:45px;

        }

        #togglePassword{

            position:absolute;

            right:15px;

            top:45%;

            transform:translateY(-50%);

            cursor:pointer;

            color:#666;

            font-size:18px;

        }

        #togglePassword:hover{

            color:#1677ff;

        }

    </style>

</head>

<body>

<div class="login-box">
    <img th:src="@{/images/logo.png}"
         alt="TalentHub Logo"
         class="logo">

    <h2>User Login to TalentHub</h2>

    <div th:if="${param.error}" class="error">
        Incorrect username or password.
    </div>

    <form th:action="@{/login}" method="post">

        <label for="username">
            Username or Email
        </label>

        <input
                id="username"
                type="text"
                name="username"
                placeholder="Enter your username or email"
                required>

        <label for="password">
            Password
        </label>

        <div class="password-container">

            <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            <i class="bi bi-eye-slash"
               id="togglePassword"></i>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="link">

        <a th:href="@{/register}">
            Create an account
        </a>

        |

        <a th:href="@{/forgot-password}">
            Forgot password ?
        </a>

    </div>

</div>
...

</div>

<script>

    const togglePassword = document.getElementById("togglePassword");

    const password = document.getElementById("password");

    togglePassword.addEventListener("click", function () {

        const type = password.type === "password"
            ? "text"
            : "password";

        password.type = type;

        this.classList.toggle("bi-eye");

        this.classList.toggle("bi-eye-slash");

    });

</script>

</body>
</html>
</body>
</html>
