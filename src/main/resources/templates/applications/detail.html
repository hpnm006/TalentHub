<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Application Detail</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .detail-card { border: 1px solid #ddd; padding: 20px; border-radius: 5px; max-width: 600px; }
        .actions { margin-top: 20px; }
        .btn { padding: 8px 12px; text-decoration: none; border-radius: 4px; border: 1px solid #ccc; background-color: #f9f9f9; cursor: pointer; display: inline-block;}
        .btn:hover { background-color: #e9e9e9; }
    </style>
</head>
<body>

    <h2>Application Detail (ID: <span th:text="${application.id}"></span>)</h2>
    
    <a href="javascript:history.back()" class="btn" style="margin-bottom: 20px;">&laquo; Back</a>

    <div class="detail-card">
        <p><strong>Candidate:</strong> <span th:text="${application.candidate.user.fullName}"></span></p>
        <p><strong>Job:</strong> <span th:text="${application.job.title}"></span></p>
        <p><strong>Status:</strong> <span th:text="${application.status}"></span></p>
        <p><strong>Applied At:</strong> <span th:text="${#temporals.format(application.appliedAt, 'yyyy-MM-dd HH:mm')}"></span></p>
        
        <p><strong>CV:</strong> 
            <a th:if="${application.cvUrl != null}" th:href="${application.cvUrl}" target="_blank">Download CV</a>
            <span th:if="${application.cvUrl == null}">No CV uploaded</span>
        </p>
        
        <p><strong>Cover Letter:</strong></p>
        <div style="background-color: #f4f4f4; padding: 10px; white-space: pre-wrap;" th:text="${application.coverLetter}"></div>

        <hr>

        <div class="actions">
            <h3>Update Status</h3>
            <form th:action="@{/applications/{id}/status(id=${application.id})}" method="post" style="display:inline-block; margin-right: 10px;">
                <select name="status">
                    <option th:each="st : ${statuses}" 
                            th:value="${st}" 
                            th:text="${st}" 
                            th:selected="${st == application.status}"></option>
                </select>
                <button type="submit" class="btn">Update Status</button>
            </form>

            <a th:if="${application.status.name() != 'INTERVIEW' and application.status.name() != 'HIRED' and application.status.name() != 'REJECTED'}" 
               th:href="@{/interviews/assign/{id}(id=${application.id})}" 
               class="btn" style="background-color: #4CAF50; color: white; border: none;">
               Assign Interview
            </a>
        </div>
    </div>

</body>
</html>
