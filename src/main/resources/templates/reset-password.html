<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>

<body>

<h2>Reset Password</h2>

<form th:action="@{/reset-password}" method="post">

    <input
            type="email"
            name="email"
            placeholder="Email"
            required>

    <br><br>

    <input
            type="text"
            name="resetCode"
            placeholder="Reset Code"
            required>

    <br><br>

    <input
            type="password"
            name="newPassword"
            placeholder="New Password"
            required>

    <br><br>

    <input
            type="password"
            name="confirmPassword"
            placeholder="Confirm Password"
            required>

    <br><br>

    <button type="submit">
        Reset Password
    </button>

</form>

<p style="color:red"
   th:text="${error}"></p>

<p style="color:green"
   th:text="${success}"></p>

</body>
</html>
