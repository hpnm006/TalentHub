<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>Register</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{

      background:#f2f4f7;

      display:flex;

      justify-content:center;

      align-items:center;

      height:100vh;

    }

    .box{

      width:450px;

      background:white;

      padding:35px;

      border-radius:12px;

      box-shadow:0 0 18px rgba(0,0,0,.15);

    }

    h2{

      text-align:center;

      margin-bottom:25px;

    }

    input{

      width:100%;

      padding:12px;

      margin:10px 0;

      border:1px solid #ccc;

      border-radius:5px;

    }

    button{

      width:100%;

      padding:12px;

      background:#0d6efd;

      color:white;

      border:none;

      border-radius:5px;

      cursor:pointer;

      margin-top:10px;

    }

    button:hover{

      background:#0a58ca;

    }

    .link{

      text-align:center;

      margin-top:20px;

    }

    .error{

      color:#dc3545;

      background:#f8d7da;

      border:1px solid #f5c2c7;

      padding:10px;

      border-radius:6px;

      margin-bottom:15px;

      text-align:center;

    }

    .field-error{

      color:#dc3545;

      font-size:13px;

      margin-top:-6px;

      margin-bottom:10px;

      font-weight:500;

    }

  </style>

</head>

<body>

<div class="box">

  <h2>Create Account</h2>

  <form th:action="@{/register}" method="post">

    <input
            type="text"
            name="fullName"
            th:value="${registerRequest.fullName}"
            placeholder="Full Name"
            required>

    <div class="field-error"
         th:if="${fullNameError}"
         th:text="${fullNameError}">
    </div>

    <input
            type="text"
            name="username"
            th:value="${registerRequest.username}"
            placeholder="Username"
            required>

    <div class="field-error"
         th:if="${usernameError}"
         th:text="${usernameError}">
    </div>

    <input
            type="email"
            name="email"
            th:value="${registerRequest.email}"
            placeholder="Email"
            required>

    <div class="field-error"
         th:if="${emailError}"
         th:text="${emailError}">
    </div>

    <input
            type="password"
            name="password"
            placeholder="Password"
            required>

    <div class="field-error"
         th:if="${passwordError}"
         th:text="${passwordError}">
    </div>

    <input
            type="password"
            name="confirmPassword"
            placeholder="Confirm Password"
            required>

    <div class="field-error"
         th:if="${confirmPasswordError}"
         th:text="${confirmPasswordError}">
    </div>

    <button type="submit">
      Create Account
    </button>

  </form>

  <div class="link">

    <a th:href="@{/login}">
      Already have an account?
    </a>

  </div>

</div>

</body>

</html>
