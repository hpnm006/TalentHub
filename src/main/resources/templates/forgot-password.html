<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
</head>

<body>

<h2>Forgot Password</h2>

<form th:action="@{/forgot-password}" method="post">

    <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required>

    <button type="submit">
        Send Code
    </button>

</form>

<p style="color:green" th:text="${message}"></p>

<a th:href="@{/login}">
    Back to Login
</a>

</body>
</html>
