<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f5f6fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{

            width:420px;

            background:white;

            padding:35px;

            border-radius:10px;

            box-shadow:0 0 15px rgba(0,0,0,.15);

        }

        h2{

            text-align:center;

            margin-bottom:20px;

        }

        input{

            width:100%;

            padding:12px;

            margin:10px 0;

            border:1px solid #ccc;

            border-radius:5px;

        }

        button{

            width:100%;

            padding:12px;

            background:#0d6efd;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

        }

        button:hover{

            background:#0a58ca;

        }

        .error{

            color:red;

            margin-bottom:15px;

            text-align:center;

        }

        .success{

            color:green;

            margin-bottom:15px;

            text-align:center;

        }

    </style>

</head>

<body>

<div class="box">

    <h2>Change Password</h2>

    <div class="error" th:text="${error}"></div>

    <div class="success" th:text="${success}"></div>

    <form th:action="@{/change-password}" method="post">

        <input
                type="password"
                name="oldPassword"
                placeholder="Current Password"
                required>

        <input
                type="password"
                name="newPassword"
                placeholder="New Password"
                required>

        <input
                type="password"
                name="confirmPassword"
                placeholder="Confirm Password"
                required>

        <button type="submit">
            Change Password
        </button>

    </form>

</div>

</body>
</html>
